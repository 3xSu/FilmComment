server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    driver-class-name: ${fc.datasource.driver-class-name}
    url: jdbc:mysql://${fc.datasource.host}:${fc.datasource.port}/${fc.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${fc.datasource.username}
    password: ${fc.datasource.password}
    type: ${fc.datasource.type}
    druid:
      # 1. 核心有效性检测配置
      validation-query: SELECT 1  # 用于检测连接的简单SQL
      test-on-borrow: true        # 关键：借出连接时强制检测有效性。如果无效，连接池会丢弃它并尝试获取另一个。
      test-while-idle: true       # 对空闲连接进行检测（配合timeBetweenEvictionRunsMillis）
      
      # 2. 连接池大小与等待配置（影响"重试"行为）
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 3000              # 获取连接时最大等待时间（毫秒）。超时则抛异常，这本身不是重试，但可配合业务代码重试。
      
      # 3. 保活配置（预防为主，解决根本）
      keep-alive: true
      time-between-eviction-runs-millis: 60000
      keep-alive-between-time-millis: 30000      # 定期执行validation-query保活
      
      # 4. 连接有效性检测相关配置
      test-on-return: false       # 归还连接时检测，通常不需要
      min-evictable-idle-time-millis: 300000     # 连接在池中最小生存时间
      max-evictable-idle-time-millis: 600000     # 连接在池中最大生存时间
      
      # 5. 监控和统计配置
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
  data:
    redis:
      host: ${fc.redis.host}
      database: ${fc.redis.database}
      port: ${fc.redis.port}
  servlet:
    multipart:
      max-file-size: 5242880
      max-request-size: 104857600
  web:
    resources:
      static-locations: classpath:/static/
  task:
    scheduling:
      pool:
        size: 10

comment:
  auto-cleanup:
    days: 7  # 逻辑删除后自动清理的天数，默认7天
    enabled: true  # 是否启用自动清理

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.fc.entity,com.fc.vo.movie,com.fc.dto.movie
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      fc:
        mapper: debug
        service: info
        controller: info
        mock: debug
    org:
      springframework:
        scheduling: debug

fc:
  jwt:
    secret-key: FilmCommentSystem2025SecureJWTKeyForAuthentication
    ttl: 7200000
    token-name: token

  alioss:
    endpoint: ${fc.alioss.endpoint}
    access-key-id: ${fc.alioss.access-key-id}
    access-key-secret: ${fc.alioss.access-key-secret}
    bucket-name: ${fc.alioss.bucket-name}

  ai:
    recommend:
      movie:
        max-recommend-num: 6  # 最大推荐数量
        min-view-num: 3        # 最小观影数据量
        high-score-threshold: 4 # 高分电影阈值
        calculate-timeout: 500 # 计算超时时间(ms)

  default:
    avatar-url: ${fc.default.avatar-url}
    movie-poster-url: ${fc.default.movie-poster-url}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /v3/api-docs
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

ollama:
  api:
    base-url: http://localhost:11434
    model: qwen2:1.5b

# AI Agent配置
agent:
  ollama:
    base-url: ${ollama.api.base-url}
    model-name: llama3.1:latest
  memory:
    max-messages: 10
    timeout-minutes: 30
  conversation:
    cleanup:
      enabled: true
      # 清理策略配置
      strategy: TIME_BASED  # TIME_BASED, COUNT_BASED, ACTIVITY_BASED
      retention-days: 30    # 保留30天数据
      retention-count: 1000 # 保留最近1000条记录
      batch-size: 1000      # 每次批量删除数量
      # 执行时间配置
      execution-time: "04:00" # 凌晨4点执行
      # 监控配置
      enable-statistics: true
      log-details: true